<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN // MERCHIVE</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22black%22/><text x=%2250%%22 y=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22monospace%22 font-weight=%22bold%22 font-size=%2260%22>MC</text></svg>">
    
    <style>
        body { 
            background: #050505; color: #eee; 
            font-family: 'Courier New', monospace; 
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; 
        }
        .login-box { 
            border: 1px solid #222; padding: 40px; background: #0a0a0a; width: 300px; 
            text-align: center;
        }
        input { 
            width: 100%; background: #111; border: 1px solid #333; 
            color: #fff; padding: 10px; margin: 20px 0; box-sizing: border-box;
            font-family: inherit;
        }
        button { 
            width: 100%; background: #fff; color: #000; border: none; 
            padding: 10px; cursor: pointer; font-weight: bold; font-family: inherit;
        }
        button:hover { background: #ccc; }
        .error { color: #ff4444; font-size: 0.7rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2 style="font-size: 1rem; letter-spacing: 2px;">ADMIN_ACCESS</h2>
        <input type="password" id="password" placeholder="ENTER_SECRET_KEY" onkeypress="if(event.key==='Enter') login()">
        <button onclick="login()">AUTHORIZE</button>
        <div id="error-msg" class="error">INVALID_CREDENTIALS</div>
        <p style="margin-top: 20px;"><a href="/" style="color: #444; text-decoration: none; font-size: 0.7rem;">← BACK_TO_GALLERY</a></p>
    </div>

    <script>
        async function login() {
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('access_token', data.access_token);
                    // Fixed: Redirects to admin panel on success
                    window.location.href = '/admin'; 
                } else {
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                console.error(err);
            }
        }
    </script>
</body>
</html>
