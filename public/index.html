<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>MERCHIVE</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; color: #fff; 
            font-family: 'SF Mono', 'Courier New', monospace; 
            margin: 0; padding: 0; 
            text-transform: uppercase; overflow-x: hidden; 
        }
        
        nav { 
            border-bottom: 1px solid #1a1a1a; padding: 20px; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .logo { font-weight: 900; letter-spacing: 4px; text-decoration: none; color: #fff; font-size: 16px; }
        .nav-links a { color: #444; text-decoration: none; font-size: 11px; letter-spacing: 1px; transition: color 0.2s; }
        .nav-links a:hover { color: #fff; }

        .hero { 
            padding: 40px 20px; border-bottom: 1px solid #1a1a1a; 
            display: flex; justify-content: center; 
        }
        .search-box { 
            width: 100%; max-width: 600px; background: #000; 
            border: 1px solid #222; padding: 18px; color: #fff; 
            font-family: inherit; outline: none; font-size: 16px; 
            border-radius: 0; appearance: none; transition: border-color 0.3s;
        }
        .search-box:focus { border-color: #fff; }

        .container { padding: 30px 20px; }
        
        /* Grid Layout */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 20px; 
        }
        
        @media (max-width: 480px) {
            .grid { grid-template-columns: 1fr; gap: 15px; }
            .hero { padding: 25px 15px; }
        }

        /* Card Styling for Readability */
        .card { 
            background: #000; 
            border: 1px solid #1a1a1a; 
            padding: 25px; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            min-height: 140px; 
            transition: all 0.2s ease-in-out;
        }
        .card:hover { border-color: #fff; background: #050505; }
        
        .card-title { 
            font-size: 14px; 
            font-weight: bold; 
            margin: 0; 
            letter-spacing: 1px; 
            line-height: 1.5; 
            color: #fff;
        }
        
        .card-tag { 
            font-size: 10px; 
            color: #666; 
            margin-top: 15px; 
            letter-spacing: 2px;
            display: flex;
            align-items: center;
        }
        .card-tag::before { content: "•"; margin-right: 8px; color: #fff; }

        /* Fullscreen Player */
        #video-overlay { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: #000; 
            z-index: 1000; flex-direction: column; align-items: center; justify-content: center; 
        }
        video { width: 100%; max-height: 75vh; background: #000; border: 1px solid #1a1a1a; }
        .close-btn { margin-top: 30px; background: #fff; color: #000; border: none; padding: 15px 50px; font-family: inherit; font-weight: bold; cursor: pointer; font-size: 12px; letter-spacing: 2px; }
        #loader { font-size: 10px; margin-bottom: 20px; letter-spacing: 3px; color: #fff; }
        
        .prog { width: 100%; height: 3px; background: #111; position: absolute; bottom: 0; left: 0; }
        #bar { height: 100%; background: #fff; width: 0%; transition: width 0.1s linear; }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo">MERCHIVE</a>
        <div class="nav-links"><a href="/login">ADMIN_PANEL</a></div>
    </nav>

    <div class="hero">
        <input type="text" id="search" class="search-box" placeholder="TYPE_TO_SEARCH..." onkeyup="filter()">
    </div>

    <div class="container">
        <div id="grid" class="grid"></div>
    </div>

    <div id="video-overlay">
        <div id="loader">HANDSHAKE_TELEGRAM...</div>
        <video id="player" controls playsinline></video>
        <div class="prog"><div id="bar"></div></div>
        <button class="close-btn" onclick="closeV()">EXIT</button>
    </div>

    <script>
        let data = [];
        const v = document.getElementById('player');
        const ov = document.getElementById('video-overlay');
        const b = document.getElementById('bar');
        const l = document.getElementById('loader');

        async function init() {
            try {
                const r = await fetch('/api/videos/list');
                const j = await r.json();
                data = j.data || [];
                render(data);
            } catch (err) {
                console.error("Fetch error", err);
            }
        }

        function render(items) {
            const g = document.getElementById('grid');
            if (!items.length) {
                g.innerHTML = '<div style="padding:40px; color:#444; font-size:11px; letter-spacing:2px;">NULL_RESULTS</div>';
                return;
            }
            g.innerHTML = items.map(i => `
                <div class="card" onclick="openV('${i.tg_file_ids[0]}')">
                    <p class="card-title">${i.title}</p>
                    <span class="card-tag">${i.category || 'GENERAL'}</span>
                </div>
            `).join('');
        }

        function openV(id) {
            ov.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            v.src = `/api/video/stream/${id}`;
            v.load();
            v.play().catch(e => {
                l.innerText = "STREAM_INTERRUPTED";
                console.log(e);
            });
        }

        function closeV() {
            v.pause();
            v.src = "";
            ov.style.display = 'none';
            document.body.style.overflow = 'auto';
            l.innerText = "HANDSHAKE_TELEGRAM...";
        }

        v.ontimeupdate = () => b.style.width = (v.currentTime / v.duration) * 100 + '%';
        v.onplaying = () => l.style.display = 'none';
        v.onwaiting = () => { l.innerText = "WAITING_FOR_DATA..."; l.style.display = 'block'; };

        function filter() {
            const q = document.getElementById('search').value.toLowerCase();
            const filtered = data.filter(i => 
                i.title.toLowerCase().includes(q) || 
                (i.category && i.category.toLowerCase().includes(q))
            );
            render(filtered);
        }

        init();
    </script>
</body>
</html>
