<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VESTA // MERCHIVE</title>
    <style>
        body { background: #050505; color: #eee; font-family: 'Courier New', monospace; padding: 40px; margin: 0; }
        #player-container { position: relative; margin-bottom: 50px; display: none; border: 1px solid #333; background: #000; width: 100%; }
        video { width: 100%; display: block; max-height: 70vh; }
        
        .progress-container { width: 100%; height: 10px; background: #111; position: relative; }
        .buffer-bar { position: absolute; height: 100%; background: #444; width: 0%; z-index: 1; }
        .play-bar { position: absolute; height: 100%; background: #0f0; width: 0%; z-index: 2; }
        
        #loading-text { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #0f0; color: #0f0; font-size: 0.8rem; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .video-card { border: 1px solid #222; cursor: pointer; padding: 15px; background: #0a0a0a; }
        .close-btn { position: absolute; top: 10px; right: 10px; z-index: 100; cursor: pointer; background: #fff; border: none; padding: 5px 10px; }
    </style>
</head>
<body>

    <h1>PROJECT VESTA // MERCHIVE</h1>

    <div id="player-container">
        <button class="close-btn" onclick="closePlayer()">CLOSE</button>
        <div id="loading-text">BUFFERING DATA...</div>
        <video id="main-player" controls crossorigin="anonymous"></video>
        <div class="progress-container">
            <div id="buffer-bar" class="buffer-bar"></div>
            <div id="play-bar" class="play-bar"></div>
        </div>
    </div>

    <div class="grid" id="video-grid"></div>

    <script>
        const player = document.getElementById('main-player');
        const bufferBar = document.getElementById('buffer-bar');
        const playBar = document.getElementById('play-bar');
        const loader = document.getElementById('loading-text');

        // Update Bars
        player.addEventListener('timeupdate', () => {
            playBar.style.width = (player.currentTime / player.duration * 100) + "%";
        });

        player.addEventListener('progress', () => {
            if (player.buffered.length > 0) {
                const bufferedEnd = player.buffered.end(player.buffered.length - 1);
                bufferBar.style.width = (bufferedEnd / player.duration * 100) + "%";
            }
        });

        // Loading Indicator
        player.addEventListener('waiting', () => loader.style.display = 'block');
        player.addEventListener('playing', () => loader.style.display = 'none');

        async function loadArchive() {
            const res = await fetch('/api/videos/list');
            const result = await res.json();
            const container = document.getElementById('video-grid');
            result.data.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `<h3>${video.title}</h3>`;
                card.onclick = () => {
                    document.getElementById('player-container').style.display = 'block';
                    player.src = `/api/video/stream/${video.tg_file_ids[0]}`;
                    player.play();
                };
                container.appendChild(card);
            });
        }

        function closePlayer() {
            player.pause();
            player.src = "";
            document.getElementById('player-container').style.display = 'none';
        }

        loadArchive();
    </script>
</body>
</html>
