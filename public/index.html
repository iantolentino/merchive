<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MERCHIVE</title>
    <style>
        :root { --accent: #00ff88; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); sticky; top: 0; z-index: 100; border-bottom: 1px solid #1a1a1a; }
        .logo { font-weight: 900; letter-spacing: 2px; color: var(--accent); text-decoration: none; }
        .nav-links a { color: #666; text-decoration: none; font-size: 0.8rem; margin-left: 20px; transition: 0.2s; }
        .nav-links a:hover { color: #fff; }

        .hero { padding: 40px 25px; background: linear-gradient(to bottom, #0a0a0a, #050505); }
        .search-box { width: 100%; max-width: 500px; background: #1a1a1a; border: 1px solid #333; padding: 12px; border-radius: 8px; color: #fff; outline: none; margin-top: 15px; }

        .container { padding: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 10px; border: 1px solid #222; overflow: hidden; transition: 0.3s; cursor: pointer; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card-thumb { height: 100px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .card-body { padding: 12px; }
        .card-title { font-size: 0.85rem; font-weight: 600; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-tag { font-size: 0.6rem; color: var(--accent); text-transform: uppercase; margin-top: 5px; display: block; }

        #video-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; flex-direction: column; justify-content: center; }
        video { width: 100%; max-height: 85vh; }
        .close-btn { position: absolute; top: 20px; right: 20px; background: #fff; color: #000; border: none; padding: 8px 16px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--accent); pointer-events: none; }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo">MERCHIVE</a>
        <div class="nav-links">
            <a href="/login">ADMIN LOGIN</a>
        </div>
    </nav>

    <div class="hero">
        <h1 style="margin:0; font-size: 1.5rem;">Discover Content</h1>
        <input type="text" id="search" class="search-box" placeholder="Search videos or categories..." onkeyup="filterVideos()">
    </div>

    <div class="container">
        <div id="grid" class="grid"></div>
    </div>

    <div id="video-overlay">
        <button class="close-btn" onclick="closeStream()">EXIT</button>
        <div id="loader">BUFFERING...</div>
        <video id="main-player" controls playsinline crossorigin="anonymous"></video>
    </div>

    <script>
        let allVideos = [];
        const player = document.getElementById('main-player');
        const overlay = document.getElementById('video-overlay');
        const loader = document.getElementById('loader');

        player.onplaying = () => loader.style.display = 'none';
        player.onwaiting = () => loader.style.display = 'block';

        async function init() {
            const res = await fetch('/api/videos/list');
            const json = await res.json();
            allVideos = json.data;
            renderGrid(allVideos);
        }

        function renderGrid(videos) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            videos.forEach(v => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-thumb">🎬</div>
                    <div class="card-body">
                        <p class="card-title">${v.title}</p>
                        <span class="card-tag">${v.category || 'Clip'}</span>
                    </div>
                `;
                card.onclick = () => openStream(v.tg_file_ids[0]);
                grid.appendChild(card);
            });
        }

        function filterVideos() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = allVideos.filter(v => 
                v.title.toLowerCase().includes(query) || 
                (v.category && v.category.toLowerCase().includes(query))
            );
            renderGrid(filtered);
        }

        function openStream(id) {
            overlay.style.display = 'flex';
            loader.style.display = 'block';
            player.src = `/api/video/stream/${id}`;
            player.play();
        }

        function closeStream() {
            player.pause();
            player.src = "";
            overlay.style.display = 'none';
        }

        init();
    </script>
</body>
</html>
