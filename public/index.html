<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VESTA // MERCHIVE</title>
    <style>
        body { background: #050505; color: #eee; font-family: 'Courier New', monospace; padding: 20px; margin: 0; }
        #player-container { position: relative; margin-bottom: 30px; display: none; background: #000; border: 1px solid #333; }
        video { width: 100%; display: block; max-height: 80vh; background: #000; outline: none; }
        .progress-bar { width: 100%; height: 6px; background: #111; position: relative; }
        .buffer-fill { position: absolute; height: 100%; background: #444; width: 0%; z-index: 1; transition: width 0.3s; }
        .play-fill { position: absolute; height: 100%; background: #0f0; width: 0%; z-index: 2; }
        #loader { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; 
                  background: rgba(0,0,0,0.9); padding: 15px; border: 1px solid #0f0; color: #0f0; font-size: 0.8rem; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .card { border: 1px solid #222; padding: 15px; cursor: pointer; background: #0a0a0a; transition: 0.2s; }
        .card:hover { border-color: #0f0; }
        .close-btn { position: absolute; top: 10px; right: 10px; z-index: 11; background: #fff; border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="letter-spacing: 2px;">PROJECT VESTA</h2>

    <div id="player-container">
        <button class="close-btn" onclick="closePlayer()">CLOSE</button>
        <div id="loader">PREPARING STREAM...<br><span id="load-percent">0%</span></div>
        <video id="video-player" controls playsinline preload="auto" crossorigin="anonymous"></video>
        <div class="progress-bar">
            <div id="buffer-bar" class="buffer-fill"></div>
            <div id="play-bar" class="play-fill"></div>
        </div>
    </div>

    <div id="grid" class="grid"></div>

    <script>
        const v = document.getElementById('video-player');
        const bBar = document.getElementById('buffer-bar');
        const pBar = document.getElementById('play-bar');
        const load = document.getElementById('loader');
        const loadText = document.getElementById('load-percent');

        v.addEventListener('progress', () => {
            if (v.buffered.length > 0) {
                const bufferedEnd = v.buffered.end(v.buffered.length - 1);
                const percent = (bufferedEnd / v.duration) * 100;
                bBar.style.width = percent + "%";
                loadText.innerText = Math.round(percent) + "% BUFFERED";
                if (bufferedEnd > v.currentTime + 2 || percent > 95) {
                    load.style.display = 'none';
                }
            }
        });

        v.onwaiting = () => load.style.display = 'block';
        v.onplaying = () => load.style.display = 'none';
        v.ontimeupdate = () => { pBar.style.width = (v.currentTime / v.duration * 100) + "%"; };

        async function loadGrid() {
            const res = await fetch('/api/videos/list');
            const { data } = await res.json();
            const grid = document.getElementById('grid');
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<strong>${item.title}</strong><br><small>${item.category}</small>`;
                div.onclick = () => {
                    document.getElementById('player-container').style.display = 'block';
                    load.style.display = 'block';
                    v.src = `/api/video/stream/${item.tg_file_ids[0]}`;
                    v.load();
                    v.play();
                    window.scrollTo(0,0);
                };
                grid.appendChild(div);
            });
        }

        function closePlayer() {
            v.pause();
            v.src = "";
            document.getElementById('player-container').style.display = 'none';
        }

        loadGrid();
    </script>
</body>
</html>
