<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VESTA // MERCHIVE</title>
    <style>
        body { background: #050505; color: #eee; font-family: monospace; padding: 40px; margin: 0; }
        .header { border-bottom: 1px solid #222; margin-bottom: 30px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-end; }
        #player-container { position: relative; margin-bottom: 50px; display: none; border: 1px solid #333; background: #000; width: 100%; }
        video { width: 100%; display: block; max-height: 70vh; }
        
        /* BUFFER BAR STYLES */
        .progress-container { width: 100%; height: 8px; background: #111; position: relative; }
        .buffer-bar { position: absolute; height: 100%; background: #444; width: 0%; transition: width 0.3s; z-index: 1; }
        .play-bar { position: absolute; height: 100%; background: #0f0; width: 0%; z-index: 2; }
        
        .close-btn { position: absolute; top: 15px; right: 15px; background: #fff; color: #000; border: none; width: 30px; height: 30px; cursor: pointer; z-index: 100; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .video-card { border: 1px solid #222; cursor: pointer; padding: 15px; background: #0a0a0a; }
        .video-card:hover { border-color: #555; }
    </style>
</head>
<body>
    <div class="header">
        <h1>PROJECT VESTA // MERCHIVE</h1>
    </div>

    <div id="player-container">
        <button class="close-btn" onclick="closePlayer()">×</button>
        <video id="main-player" controls crossorigin="anonymous"></video>
        <div class="progress-container">
            <div id="buffer-bar" class="buffer-bar"></div>
            <div id="play-bar" class="play-bar"></div>
        </div>
    </div>

    <div class="grid" id="video-grid"></div>

    <script>
        const player = document.getElementById('main-player');
        const bufferBar = document.getElementById('buffer-bar');
        const playBar = document.getElementById('play-bar');

        // TRACK BUFFER PROGRESS
        player.addEventListener('progress', () => {
            if (player.duration > 0) {
                for (let i = 0; i < player.buffered.length; i++) {
                    if (player.buffered.start(player.buffered.length - 1 - i) < player.currentTime) {
                        const width = (player.buffered.end(player.buffered.length - 1 - i) / player.duration) * 100;
                        bufferBar.style.width = width + "%";
                        break;
                    }
                }
            }
        });

        // TRACK PLAYBACK PROGRESS
        player.addEventListener('timeupdate', () => {
            if (player.duration > 0) {
                const width = (player.currentTime / player.duration) * 100;
                playBar.style.width = width + "%";
            }
        });

        async function loadArchive() {
            const res = await fetch('/api/videos/list');
            const result = await res.json();
            const container = document.getElementById('video-grid');
            container.innerHTML = '';
            
            result.data.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `<h3>${video.title}</h3><p>${video.category}</p>`;
                card.onclick = () => {
                    document.getElementById('player-container').style.display = 'block';
                    player.src = `/api/video/stream/${video.tg_file_ids[0]}`;
                    player.load();
                    player.play();
                };
                container.appendChild(card);
            });
        }

        function closePlayer() {
            player.pause();
            player.src = "";
            document.getElementById('player-container').style.display = 'none';
        }

        loadArchive();
    </script>
</body>
</html>
