<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VESTA // MERCHIVE</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='black'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' fill='white' font-family='monospace' font-weight='bold' font-size='35'%3EPVM%3C/text%3E%3C/svg%3E">
    <style>
        body { background: #050505; color: #eee; font-family: 'Courier New', monospace; padding: 40px; margin: 0; }
        .header { border-bottom: 1px solid #222; margin-bottom: 30px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-end; }
        /* Hide nav links by default, JS will show them if token exists */
        .nav-links a { color: #666; text-decoration: none; font-size: 0.8rem; margin-left: 20px; cursor: pointer; display: none; }
        .nav-links a:hover { color: #fff; }
        #player-container { position: relative; margin-bottom: 50px; display: none; border: 1px solid #333; background: #000; width: 100%; }
        video { width: 100%; display: block; max-height: 70vh; }
        .close-btn { position: absolute; top: 15px; right: 15px; background: #fff; color: #000; border: none; width: 30px; height: 30px; cursor: pointer; z-index: 100; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .video-card { border: 1px solid #222; cursor: pointer; transition: 0.3s; background: #0a0a0a; position: relative; }
        .video-card:hover { border-color: #555; background: #111; }
        .card-visual { height: 160px; display: flex; align-items: center; justify-content: center; background: #111; border-bottom: 1px solid #222; text-align: center; padding: 20px; overflow: hidden; }
        .card-visual span { color: #444; font-size: 0.8rem; text-transform: uppercase; }
        .video-info { padding: 15px; }
        .video-info h3 { font-size: 0.9rem; margin: 0; color: #fff; }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,0,0,0.8); border: 1px solid red; color: white; cursor: pointer; display: none; z-index: 10; padding: 2px 5px; font-size: 10px; }
        #buffer-status {
            background: #111;
            padding: 10px 15px;
            font-size: 0.7rem;
            color: #888;
            border-top: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #progress-bar-container {
            width: 100%;
            height: 4px;
            background: #222;
            overflow: hidden;
        }
        #progress-bar-fill {
            height: 100%;
            width: 0%;
            background: #0f0; /* Neon Green */
            box-shadow: 0 0 10px #0f0;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>PROJECT VESTA // MERCHIVE</h1>
            <p style="color: #444; font-size: 0.7rem;">STATUS: <span style="color: #0f0;">ONLINE</span></p>
        </div>
        <div class="nav-links" id="nav-links">
            <a href="/admin" id="admin-link">+ ADD_VIDEO</a>
            <a onclick="logout()" id="logout-link">[ LOGOUT ]</a>
        </div>
    </div>

    <div id="player-container">
        <button class="close-btn" onclick="closePlayer()">×</button>
        <video id="main-player" controls crossorigin="anonymous"></video>
        
        <div id="progress-bar-container">
            <div id="progress-bar-fill"></div>
        </div>
        <div id="buffer-status">
            <span id="load-state">SYSTEM READY</span>
            <span id="load-percentage">0% PRE-LOADED</span>
        </div>
    </div>

    <div class="grid" id="video-grid"></div>

<script>
    const token = localStorage.getItem('access_token');

    // UI Toggle Logic: Runs immediately to show/hide admin buttons
    function updateUI() {
        const adminLink = document.getElementById('admin-link');
        const logoutLink = document.getElementById('logout-link');
        
        if (token) {
            adminLink.style.display = 'inline';
            logoutLink.style.display = 'inline';
        } else {
            adminLink.style.display = 'none';
            logoutLink.style.display = 'none';
        }
    }
    
    function logout() {
        localStorage.removeItem('access_token');
        window.location.href = '/'; 
    }

    function closePlayer() {
        const player = document.getElementById('main-player');
        player.pause();
        player.innerHTML = ""; // Clear sources and tracks
        player.src = "";
        player.load(); 
        document.getElementById('player-container').style.display = 'none';
    }

    async function deleteVideo(id, event) {
        event.stopPropagation();
        if (!confirm("DELETE VIDEO?")) return;
        try {
            const res = await fetch(`/api/videos/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                location.reload();
            } else {
                alert("Failed to delete video.");
            }
        } catch (err) {
            console.error("Delete error:", err);
        }
    }

    async function loadArchive() {
        try {
            const res = await fetch('/api/videos/list');
            const result = await res.json();
            const container = document.getElementById('video-grid');
            
            if (!result.data || result.data.length === 0) {
                container.innerHTML = '<p style="color:#444;">NO VIDEOS FOUND IN ARCHIVE.</p>';
                return;
            }

            container.innerHTML = '';

            result.data.forEach(video => {
                const msgId = (video.tg_file_ids && video.tg_file_ids.length > 0) ? video.tg_file_ids[0] : null;
                
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <button class="delete-btn" onclick="deleteVideo('${video.id}', event)">DEL</button>
                    <div class="card-visual"><span>${video.title}</span></div>
                    <div class="video-info">
                        <h3>${video.title}</h3>
                        <p style="color:#555; font-size:0.6rem;">${(video.category || 'Uncategorized').toUpperCase()}</p>
                    </div>
                `;
                
                if(token) {
                    const delBtn = card.querySelector('.delete-btn');
                    if(delBtn) delBtn.style.display = 'block';
                }

                card.onclick = () => {
                    const player = document.getElementById('main-player');
                    const playerCont = document.getElementById('player-container');
                    const loadState = document.getElementById('load-state');
                    const loadPercent = document.getElementById('load-percentage');
                    const progressFill = document.getElementById('progress-bar-fill');
                    
                    playerCont.style.display = 'block';
                    player.pause();
                    player.innerHTML = ''; // Clear old tracks
                    
                    // 1. Direct Stream URL
                    // Letting the browser handle the fetch is safer for large files
                    const streamUrl = `/api/video/stream/${msgId}`;
                    player.src = streamUrl;
                    
                    loadState.innerText = "CONNECTING TO VESTA...";
                    loadState.style.color = "orange";
                    progressFill.style.width = "0%";

                    // 2. Track the Browser's Native Buffering Progress
                    player.onprogress = () => {
                        if (player.buffered.length > 0) {
                            const bufferedEnd = player.buffered.end(player.buffered.length - 1);
                            const duration = player.duration;
                            if (duration > 0) {
                                const percent = (bufferedEnd / duration) * 100;
                                progressFill.style.width = percent + "%";
                                loadPercent.innerText = `${Math.round(percent)}% CACHED`;
                            }
                        }
                    };

                    player.oncanplay = () => {
                        loadState.innerText = "STABLE // STREAMING";
                        loadState.style.color = "#0f0";
                        player.play().catch(() => {
                            // Browsers often block autoplay with sound
                            player.muted = true; 
                            player.play();
                        });
                    };

                    player.onwaiting = () => {
                        loadState.innerText = "RE-BUFFERING...";
                        loadState.style.color = "yellow";
                    };

                    player.onerror = () => {
                        console.error("Vesta_Stream_Error:", player.error.code);
                        loadState.innerText = "STREAM INTERRUPTED";
                        loadState.style.color = "red";
                    };

                    // 3. Subtitles track injection
                    if (video.subtitle_url) {
                        const track = document.createElement('track');
                        track.kind = 'subtitles';
                        track.src = video.subtitle_url;
                        track.srclang = 'en';
                        track.label = "English";
                        track.default = true;
                        player.appendChild(track);
                    }

                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                    
                container.appendChild(card);
            });
        } catch (err) {
            console.error("Failed to load archive:", err);
            document.getElementById('video-grid').innerHTML = '<p style="color:red;">SERVER ERROR: FAILED TO FETCH VIDEO LIST.</p>';
        }
    }

    // Execute on Load
    updateUI();
    loadArchive();
</script>
</body>
</html>
